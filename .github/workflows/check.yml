name: Check

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck qml6-dev-tools
      - name: Run checks
        run: ./scripts/check.sh
