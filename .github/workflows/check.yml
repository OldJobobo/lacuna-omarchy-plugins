name: Check

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container: archlinux:latest
    env:
      OMARCHY_PATH: ${{ github.workspace }}/.ci/omarchy
    steps:
      - name: Install tools
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel \
            git \
            namcap \
            nodejs \
            python \
            python-pytest \
            qt6-declarative \
            qt6-multimedia \
            shellcheck
      - uses: actions/checkout@v7
      - uses: actions/checkout@v7
        with:
          repository: basecamp/omarchy
          ref: 0526ebefccf6e58fb2cc9419070f1b5aff4b2df2
          path: .ci/omarchy
      - name: Configure Qt tools
        run: echo "/usr/lib/qt6/bin" >> "$GITHUB_PATH"
      - name: Verify required runtimes
        run: |
          python3 --version
          node --version
      - name: Run checks
        run: ./scripts/check.sh
      - name: Rehearse AUR package
        run: scripts/rehearse-aur-package
