name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    container: archlinux:latest
    env:
      OMARCHY_PATH: ${{ github.workspace }}/.ci/omarchy
    steps:
      - name: Install tools
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel \
            git \
            namcap \
            nodejs \
            python \
            python-pytest \
            qt6-declarative \
            qt6-multimedia \
            shellcheck

      - uses: actions/checkout@v7
      - uses: actions/checkout@v7
        with:
          repository: basecamp/omarchy
          ref: 0526ebefccf6e58fb2cc9419070f1b5aff4b2df2
          path: .ci/omarchy
      - name: Configure Qt tools
        run: echo "/usr/lib/qt6/bin" >> "$GITHUB_PATH"

      - name: Run release checks
        run: ./scripts/check.sh

      - name: Verify tag matches VERSION
        run: |
          version="$(cat VERSION)"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match VERSION ${version}" >&2
            exit 1
          fi

      - name: Validate manifest/VERSION parity
        run: python3 -m pytest tests/test_manifest_contracts.py -q

      - name: Rehearse AUR package
        run: scripts/rehearse-aur-package

      - name: Build deterministic archive and checksums
        run: scripts/build-release-archive --check-reproducible

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-beta.') || contains(github.ref_name, '-rc.') }}
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.tar.gz.inventory.json
