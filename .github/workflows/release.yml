name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    container: archlinux:latest
    env:
      OMARCHY_PATH: ${{ github.workspace }}/.ci/omarchy
    steps:
      - name: Install tools
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel \
            git \
            nodejs \
            python \
            python-pytest \
            qt6-declarative \
            shellcheck

      - uses: actions/checkout@v7
      - uses: actions/checkout@v7
        with:
          repository: basecamp/omarchy
          ref: 3d4bb9ab813d9dc469dd6311216425c7aff18199
          path: .ci/omarchy
      - name: Configure Qt tools
        run: echo "/usr/lib/qt6/bin" >> "$GITHUB_PATH"

      - name: Run release checks
        run: ./scripts/check.sh

      - name: Verify tag matches VERSION
        run: |
          version="$(cat VERSION)"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match VERSION ${version}" >&2
            exit 1
          fi

      - name: Validate manifest/VERSION parity
        run: python3 -m pytest tests/test_manifest_contracts.py -q

      - name: Build archive and checksums
        run: |
          version="$(cat VERSION)"
          name="lacuna-omarchy-plugins-${version}"
          tar --exclude-vcs --exclude='__pycache__' -czf "${name}.tar.gz" \
            lacuna.* shared scripts docs config packaging \
            README.md LICENSE VERSION CHANGELOG.md AGENTS.md
          sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.tar.gz
            *.tar.gz.sha256
