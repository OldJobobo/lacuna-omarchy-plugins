      .label { font: 500 15px Inter, "SF Pro Text", sans-serif; letter-spacing: 0; fill: #c6c0b4; }
      .subtle { font: 500 12px Inter, "SF Pro Text", sans-serif; letter-spacing: 0; fill: #827d76; }
      .micro { font: 600 12px Inter, "SF Pro Text", sans-serif; letter-spacing: 0; fill: #88c6cf; }
      .muted { fill: #77736d; }
      .accent { fill: #7cc7d3; }
      .gold { fill: #c7ad77; }
      .stroke { stroke: #343842; stroke-width: 1; }
      .hair { stroke: #3a3d45; stroke-width: 1; opacity: 0.8; }
      .cyanStroke { stroke: #76c7d5; stroke-width: 2; }
      .goldStroke { stroke: #c7ad77; stroke-width: 2; }
