      <text x="372" y="214">  connectorWidth: 22  cornerKappa: 0.5522847498</text>
      <text x="372" y="280">• state layer: hoverReveal -> seam opacity</text>
      <text x="372" y="346">• section spacing: 8px grid / 16px icons</text>
      <text x="372" y="412">• panel fill only; dividers own borders</text>
      <text x="372" y="478">• attached edge remains square</text>
      <text x="372" y="612">function surfacePath(width, height) {</text>
      <text x="372" y="678">  return exposedCornersOnly;</text>
      <text x="372" y="744">}</text>
      <text x="1490" y="148">readonly property bool focused: activeSurface</text>
      <text x="1490" y="214">readonly property color accent: theme.cyan</text>
      <text x="1490" y="280">readonly property int iconSize: 16</text>
      <text x="1490" y="346">readonly property int barSize: 32</text>
      <text x="1490" y="412">readonly property int rowHeight: 48</text>
      <text x="1490" y="478">readonly property real shadow: restrained</text>
    </g>
  </g>

