<svg xmlns="http://www.w3.org/2000/svg" width="2560" height="1440" viewBox="0 0 2560 1440">
  <defs>
    <linearGradient id="workspaceGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13151a"/>
      <stop offset="0.55" stop-color="#1a181b"/>
      <stop offset="1" stop-color="#101316"/>
    </linearGradient>
    <linearGradient id="panelFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#202229"/>
      <stop offset="1" stop-color="#181a20"/>
    </linearGradient>
    <linearGradient id="barFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#191b22"/>
      <stop offset="0.5" stop-color="#222029"/>
      <stop offset="1" stop-color="#181b21"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.36"/>
    </filter>
    <filter id="tightShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
